interface:
  display_name: "EMARX"
  short_description: "本地资料优先的研究型中文学理论文生产系统，支持全量文章拆解、3-5篇锚定、逐段写作、结构防火墙、事实核查与 Word 交付。"
  default_prompt: "使用 $emarx。先基于工作空间文章拆解报告锚定3-5篇本地论文，在内部完成影子重组、逻辑骨架、段落级详细大纲、论证许可、引用规划和事实风险检查；正式论文标题必须呈现论证对象、机制、风险或路径，不能把诊断卡、概念边界、机制链、材料锚定、审稿等流程写成章节。正式写作必须按大纲一段一段写，不能一次生成多段后再泛泛润色。按1-1.2万字正文、二级标题、平实学术风格生成 Word 中文学理论文。"
