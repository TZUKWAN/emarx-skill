interface:
  display_name: "EMARX"
  short_description: "中文学理思辨论文生产技能：本地资料优先、锚定论文精读、非模板化论证骨架、逐段写作、引用事实核查与 Word 交付。"
  default_prompt: "使用 $emarx。先读取用户当前工作空间的真实资料，再根据题目锚定三至五篇相关论文并回到原文精读；旧报告只能作索引，不能替代当次读取。完整论文先形成研究诊断、来源到论点映射、影子重组、论证骨架和段落级大纲，再一段一段写。正文标题必须呈现论证关系，不能出现“研究对象与概念边界”“材料锚定”“创新点分析”等后台流程标题。摘要采用无作者主语的报道式表达，不写“本文认为”“本文的核心观点是”。正文不使用“有研究指出”“相关研究表明”等综述插入句，文献必须消化为概念、机制、材料、限制或对话后随句引用。语言平实、清楚、稳健、有学术质感，避免机械序列词、公式化对照、冒号小标题腔、密集引号和破折号式 AI 腔。完整论文默认 10000-12000 字、主体有二级标题、生成 DOCX，并进行事实、引用、坏稿和 DOCX 审计。"
