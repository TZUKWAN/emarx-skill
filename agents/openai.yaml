interface:
  display_name: "EMARX"
  short_description: "本地资料优先的研究型中文学理论文生产系统，支持当前工作空间论文锚定、即时拆解、逐段写作、结构防火墙、事实核查与 Word 交付。"
  default_prompt: "使用 $emarx。先扫描用户当前工作空间中的真实论文文件，基于题目锚定3-5篇本地论文，再即时拆解锚定论文的摘要、引言、主体、结论、文风、写作手法和论证方式；旧拆解报告只能作为缓存，不能替代当次读取。随后在内部完成影子重组、逻辑骨架、段落级详细大纲、论证许可、引用规划和事实风险检查。正式写作必须按大纲一段一段写，不能一次生成多段后再泛泛润色。"
