interface:
  display_name: "EMARX"
  short_description: "中文学理思辨论文生产技能：本地资料优先、期刊体例画像、锚定论文精读、问题链论证、小节质量门、逐段写作、引用事实核查与 Word 交付。"
  default_prompt: "使用 $emarx。先读取用户当前工作空间的真实资料，再根据题目锚定三至五篇相关论文并回到原文精读；旧报告只能作索引，不能替代当次读取。完整论文先形成期刊体例画像，明确引言类型、摘要类型、章下小序习惯和标题层级，再形成研究诊断、来源到论点映射、影子重组、论证骨架、小节论证卡、问题链、文献功能绑定和段落级大纲。引言不默认写长，根据目标期刊或锚定论文选择短引言、标准引言或政策阐释—文献对话—问题引出。摘要采用中文人文社科无作者主语报道式表达，不写理科式目的方法结果结论，也不写“本文认为”“本文的核心观点是”。正文一级章节下通常设置短小章下小序，用于承接上一层问题并引出本章内部问题链。正文以二级小节为准入单元，小节内一段一段写；每个小节从具体对象或小问题进入，经关系、机制、限度推向较大判断，尽量以小见大，避免宏大判断倒扣材料。每个小节写完必须通过 section_quality_gate.py，未通过不得并入全文。正文标题必须呈现论证关系，不能出现“研究对象与概念边界”“材料锚定”“创新点分析”等后台流程标题。正文不使用“有研究指出”“相关研究表明”等综述插入句，文献必须消化为概念、机制、材料、限制或对话后随句引用。语言平实、清楚、稳健、有学术质感，避免机械序列词、公式化对照、冒号小标题腔、密集引号和破折号式 AI 腔。完整论文默认 10000-12000 字、主体有二级标题、生成 DOCX，并进行事实、引用、小节质量门、坏稿、学理性和 DOCX 审计。"
