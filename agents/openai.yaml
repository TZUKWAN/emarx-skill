interface:
  display_name: "EMARX"
  short_description: "本地资料优先的研究型中文学理论文生产系统，支持当前工作空间论文锚定、即时拆解、逐段写作、无主语摘要、反综述插入、结构防火墙、事实核查与 Word 交付。"
  default_prompt: "使用 $emarx。先扫描用户当前工作空间中的真实论文文件，基于题目锚定3-5篇本地论文，再即时拆解锚定论文的摘要、引言、主体、结论、文风、写作手法和论证方式；旧拆解报告只能作为缓存，不能替代当次读取。随后在内部完成影子重组、逻辑骨架、段落级详细大纲、论证许可、引用规划和事实风险检查。正式写作必须按大纲一段一段写，不能一次生成多段后再泛泛润色。摘要默认采用无作者主语、面向对象的报道式写法，禁止用“本文”“笔者”“本研究”“本文认为”“本文的核心观点是”来说明自己在写什么；正文不得用“有研究指出”“已有研究认为”“相关研究指出”等综述插入句堆文献，必须先把文献消化进概念、机制、问题或限制，再按句随文引用。正文标点保持克制，避免冒号小标题腔、装饰性引号和破折号式 AI 腔。"
